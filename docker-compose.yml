services:

  ingest:
    build:
      context: ./python
    command: python ingest.py
    env_file: .env
    volumes:
      - ./docs:/app/docs:ro
      - index_data:/app/python/data
    restart: "no"

  api:
    build:
      context: ./python
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./docs:/app/docs:ro
      - index_data:/app/python/data
    depends_on:
      ingest:
        condition: service_completed_successfully
    restart: unless-stopped

